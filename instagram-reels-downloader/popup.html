<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram Reels Downloader</title>
  <script src="lib/jszip.min.js"></script>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    h2 {
      margin-bottom: 15px;
      font-size: 18px;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 5px;
      width: 100%;
    }
    button:hover {
      background-color: #45a049;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 15px;
      font-size: 13px;
      color: #333;
    }
    .progress {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h2>📥 Reels Downloader</h2>
  <button id="downloadBtn">Download All Reels</button>
  <div id="status"></div>
  <div id="progress" class="progress"></div>
  <script src="popup.js"></script>
</body>
</html>
